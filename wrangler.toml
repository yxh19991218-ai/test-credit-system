# Cloudflare Workers 部署配置 — 后端 API 代理（备用方案）
# 如果 Pages Functions 不够用，可以单独部署此 Worker。
#
# 使用方式:
#   1. 将后端部署到 Railway / Fly.io / VPS
#   2. 修改下方 API_BACKEND_URL 为实际地址
#   3. 部署 Worker:
#      npm install -g wrangler
#      wrangler deploy
#
# 注意: wrangler.toml 放在仓库根目录，worker.js 在 wrangler/ 子目录中

name = "credit-system-api"
main = "wrangler/src/worker.js"
compatibility_date = "2026-04-26"

# 后端实际地址（部署后修改为真实地址）
# 例如: https://credit-system-backend.railway.app
vars = {
  API_BACKEND_URL = "http://localhost:8080"
}

# 路由配置 — 部署后替换为你的域名和 Zone ID
# routes = [
#   { pattern = "api.your-domain.com/*", zone_id = "<your-zone-id>" }
# ]
