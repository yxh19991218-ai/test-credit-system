# Cloudflare Pages 部署配置
# 前端静态页面 + Pages Functions API 代理
#
# 构建命令: npm run build
# 构建输出目录: credit-admin/dist
# 根目录: credit-admin

[build]
command = "cd credit-admin && npm run build"
output_dir = "dist"

[build.environment]
NODE_VERSION = "20"

# ============================================================
# SPA 路由 — 所有非 API 路径指向 index.html
# ============================================================
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
